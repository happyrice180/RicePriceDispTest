<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>米価JSON確認</title>
</head>
<body>
  <h1>米価JSON確認</h1>
  <pre id="output">loading...</pre>

  <script>
    fetch("./data/rice_price.json")
      .then(response => response.json())
      .then(json => {
        document.getElementById("output").textContent =
          JSON.stringify(json, null, 2);
      })
      .catch(error => {
        document.getElementById("output").textContent =
          "読み込み失敗: " + error;
      });
  </script>
</body>
</html>
